worker_processes 1;

events {
    worker_connections 512;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Logging
    access_log /data/data/com.termux/files/home/MiniShinobi/logs/nginx-access.log;
    error_log  /data/data/com.termux/files/home/MiniShinobi/logs/nginx-error.log;

    # Gzip compression for static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # Dashboard backend (port 4000 -> 3000)
    server {
        listen 4000;
        server_name localhost;

        # Proxy all requests to Express backend
        location / {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 86400s;   # SSE streams need a long timeout
        }
    }
}
